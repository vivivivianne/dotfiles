#EXEC ONCE

# lock file used to avoid running the hyprland_reload.sh script the first time
exec-once = touch /tmp/hyprstart.lock 

# exec-once = systemctl --user start hyprpolkitagent
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# UI Related Stuff #
# exec-once = swww-daemon --format xrgb;

# exec-once = swww img $XDG_CONFIG_HOME/Wallpapers/$(wpg -c)

# exec-once = hyprpm reload -n
# exec-once = nm-applet --indicator & 
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

exec-once = udiskie

# Audio n Music Stuff #
exec-once = playerctld daemon 
exec-once = mpd 
exec-once = mpDris2 
# exec-once = sleep 3 && mpc random on && mpc play 

# Auto launch Apps i like #
exec-once = [group set always] easyeffects &
exec-once = secrets &
exec-once = obsidian &
exec-once = vesktop --enable-features=WaylandWindowDecorations --ozone-platform-hint=auto &
exec-once = waterfox &

# Reload script that updates themes and everything #
exec = ~/.config/hypr/scripts/hyprland_reload.sh

# Daemons and BG apps #
exec-once = systemctl --user import-environment QT_QPA_PLATFORMTHEME WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ~/.config/hypr/scripts/xdg-portal-reset.sh

# Location provider and night light
exec-once = /usr/lib/geoclue-2.0/demos/agent
exec-once = sleep 1 && gammastep &
exec-once = sleep 2 && gammastep-indicator &


exec-once = syncthing;
exec-once = syncthing-gtk --minimized

exec-once = caelestia shell -d &
