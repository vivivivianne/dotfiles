
# WINDOW RULES

windowrule = center 1, match:float 1, match:xwayland 0  # Center all floating windows (not xwayland cause popups)

#Float 
windowrule = float on, center on, size 960 480, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(.*nemo)$
windowrule = float on, match:title ^(wpgtk.*)$
windowrule = float on, match:class ^(feh)$
windowrule = float on, match:class ^(mpv)$
windowrule = float on, match:title ^(guiscrcpy)$
windowrule = float on, match:class ^(.*org.kde.kdenlive.*)$
windowrule = float on, match:class guifetch  # FlafyDev/guifetch
windowrule = float on, match:class yad
windowrule = float on, match:class zenity
windowrule = float on, match:class wev
windowrule = float on, match:class org\.gnome\.FileRoller
windowrule = float on, match:class file-roller  # WHY IS THERE TWOOOOOOOOOOOOOOOO
windowrule = float on, match:class blueman-manager
windowrule = float on, match:class com\.github\.GradienceTeam\.Gradience
windowrule = float on, match:class feh
windowrule = float on, match:class imv
windowrule = float on, match:class imv
windowrule = float on, match:class system-config-printer
windowrule = float on, match:class ^(.*quickshell)$
windowrule = float on, size (monitor_w*0.5) (monitor_h*0.6), center 1, match:class nwg-look

#Center

# Open files / Screen share
windowrule = group deny, size 480 480, float on, pin on, match:class ^(hyprland-share-picker)$
windowrule = float on, size 960 480, center on, match:title ^(Abrir arquivos)$

#rofi 
windowrule = float on, min_size 960 960, animation overshoot, stay_focused on, match:class ^(Rofi)$
windowrule = size 720 480, match:class ^(kitty)$


# Move to workspace
windowrule = workspace 2 silent, match:class ^(.*org.kde.kdenlive.*)$
windowrule = workspace 2 silent, match:class ^(.*krita.*)$

windowrule = workspace 3 silent, match:class ^(.*obsidian.*)$
windowrule = workspace 4 silent, match:class ^(.*Spotify.*)$
windowrule = workspace 4 silent, match:class ^(.*discord.*)$
windowrule = workspace 4 silent, match:class ^(.*Vencord.*)$
windowrule = workspace 4 silent, match:class ^(.*vesktop.*)$
windowrule = workspace 4 silent, match:class ^(.*easyeffects)$

windowrule = workspace 5 silent, match:class ^(.*waterfox.*)$
windowrule = workspace special silent, match:class ^(org.gnome.World.Secrets)$

windowrule = workspace 6 silent, match:class ^(itch)$
windowrule = workspace 6 silent, match:class ^(Steam)$
windowrule = workspace 6 silent, match:class ^(gamescope)$
windowrule = workspace 6 silent, match:class ^(steam)$
windowrule = workspace 6 silent, no_screen_share on, match:class ^(itch)$
windowrule = workspace 9 silent, match:class ^(com.obsproject.Studio)$

#Todo popup
windowrule = float on, move (1520) (32), size 360 270, pin on, match:class ^(todo)$

# games
windowrule = workspace 8 silent, match:title ^(THE FINALS)$

# Layer Rules
layerrule = animation slide, match:namespace rofi

layerrule = animation none, match:namespace selection

# ######## Window rules ########

# Float, resize and center
windowrule = float on, size (monitor_w*0.6) (monitor_h*0.7), center 1, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser

# Dialogs
windowrule = float on, match:title (Select|Open)( a)? (File|Folder)(s)?
windowrule = float on, match:title File (Operation|Upload)( Progress)?
windowrule = float on, match:title .* Properties
windowrule = float on, match:title Export Image as PNG
windowrule = float on, match:title GIMP Crash Debug
windowrule = float on, match:title Save As
windowrule = float on, match:title Library

# # Picture in picture (resize and move done via script)
# windowrule = move 100%-w-2% 100%-w-3%, title:Picture(-| )in(-| )[Pp]icture  # Initial move so window doesn't shoot across the screen from the center
# windowrule = keepaspectratio, title:Picture(-| )in(-| )[Pp]icture
# windowrule = float, title:Picture(-| )in(-| )[Pp]icture
# windowrule = pin, title:Picture(-| )in(-| )[Pp]icture

# Steam
windowrule = rounding 10, match:title steam , match:class steam
windowrule = float on, match:title Friends List, match:class steam
windowrule = immediate on, match:class steam_app_[0-9]+  # Allow tearing for steam games
windowrule = idle_inhibit always, match:class steam_app_[0-9]+  # Always idle inhibit when playing a steam game

# Make Creative software opaque
windowrule = opaque true, match:class krita|gimp|inkscape|darktable|resolve|kdenlive|shotcut|blender|godot

# Make PNGTubers, Webcams and OBS streams on other monitors keep rendering
windowrule = render_unfocused true, match:class com.obsproject.Studio|iriunwebcam|PNGTuberPlus|scrcpy

# Ugh xwayland popups
windowrule = no_dim on, no_shadow on, rounding 10, match:xwayland 1, match:title win[0-9]+

# ######## Workspace rules ########
workspace = w[tv1]s[false], gapsout:20, gapsin:20
workspace = f[1]s[false], gapsout:20, gapsin:20

# ######## Layer rules ########
layerrule = animation fade, match:namespace hyprpicker  # Colour picker out animation
layerrule = animation fade, match:namespace logout_dialog  # wlogout
layerrule = animation fade, match:namespace selection  # slurp
layerrule = animation fade, match:namespace wayfreeze

# Fuzzel
layerrule = animation popin 80%, blur on, match:namespace launcher

# Shell
layerrule = no_anim on, match:namespace caelestia-(launcher|osd|notifications|border-exclusion|area-picker)
layerrule = animation fade, match:namespace caelestia-(drawers|background)
layerrule = order 1, match:namespace caelestia-border-exclusion
layerrule = order 2, match:namespace caelestia-bar

windowrule= no_screen_share on,match:class ^(vesktop)$

