# WINDOW RULES

windowrule = center on, match:float match: negative:xwayland  # Center all float oning windows (not xwayland cause popups)

#Float 
windowrule = float on,match:class ^(pavucontrol)$
windowrule = float on,match:class ^(.*nemo)$
windowrule = float on,match:title ^(wpgtk.*)$
windowrule = float on,match:class ^(feh)$
windowrule = float on,match:class ^(mpv)$
windowrule = float on,match:title ^(guiscrcpy)$

windowrule = float on, match:class guifetch  # FlafyDev/guifetch
windowrule = float on, match:class yad
windowrule = float on, match:class zenity
windowrule = float on, match:class wev
windowrule = float on, match:class org\.gnome\.FileRoller
windowrule = float on, match:class file-roller  # WHY IS THERE TWOOOOOOOOOOOOOOOO
windowrule = float on, match:class blueman-manager
windowrule = float on, match:class com\.github\.GradienceTeam\.Gradience
windowrule = float on, match:class feh
windowrule = float on, match:class imv
windowrule = float on, match:class system-config-printer
windowrule = float on, match:class ^(.*quickshell)$
windowrule = float on, match:class nwg-look
windowrule = size 50% 60%, match:class nwg-look
windowrule = center 1, match:class nwg-look

#Center
windowrulev2=center,match:class ^(pavucontrol)$

# Open files / Screen share
windowrulev2=group deny ,match:class ^(hyprland-share-picker)$
windowrulev2=size 480 480,match:class ^(hyprland-share-picker)$
windowrulev2=float on,match:class ^(hyprland-share-picker)$
windowrulev2=pin ,match:class ^(hyprland-share-picker)$

windowrulev2=float on,match:title ^(Abrir arquivos)$
windowrulev2=size 960 480,match:title ^(Abrir arquivos)$
windowrulev2=center,match:title ^(Abrir arquivos)$

#rofi 
windowrulev2=float on,match:class ^(Rofi)$
windowrulev2=minsize 960 960,match:class ^(Rofi)$
windowrulev2=animation overshoot,match:class ^(Rofi)$
windowrulev2=stayfocused,match:class ^(Rofi)$
windowrulev2=size 720 480,match:class ^(kitty)$

windowrulev2=size 960 480,match:class ^(pavucontrol)$

# Move to workspace
windowrulev2=workspace 3 silent,match:class ^(.*obsidian.*)$
windowrulev2=workspace 4 silent,match:class ^(.*Spotify.*)$
windowrulev2=workspace 4 silent,match:class ^(.*discord.*)$
windowrulev2=workspace 4 silent,match:class ^(.*Vencord.*)$
windowrulev2=workspace 4 silent,match:class ^(.*vesktop.*)$
windowrulev2=workspace 4 silent,match:class ^(.*easyeffects)$

windowrulev2=workspace 5 silent,match:class ^(.*waterfox.*)$
windowrulev2=workspace 5 silent,match:class ^(org.keepassxc.KeePassXC)$

windowrulev2=workspace 6 silent,match:class ^(Steam)$
windowrulev2=workspace 6 silent,match:class ^(gamescope)$
windowrulev2=workspace 6 silent,match:class ^(steam)$
windowrulev2=workspace 6 silent,match:class ^(itch)$
windowrulev2=workspace 8 silent,match:title ^(THE FINALS)$

#Todo popup
windowrulev2=float on,match:class ^(todo)$
windowrulev2=move 1520 32, match:class ^(todo)$
windowrulev2=size 360 270,match:class ^(todo)$
windowrulev2=pin,match:class ^(todo)$

# games

# PNGTuberPlus
windowrulev2=renderunfocused,match:class ^(PNGTuberPlus)$
windowrulev2=renderunfocused,match:class ^(pngtuberplus)$

# Layer Rules
# layerrule = no-blur on,match:class waybar
# layerrule = no-blur on,match:class swaync-control-center
# layerrule = animation slide left ,swaync-control-center
# layerrule = animation slide left,swaync-notification-window
layerrule = animation slide,match:class rofi
layerrule = animation slide left,match:class gtk-layer-shell


layerrule = animation none, match:class selection

# ######## Window rules ########
windowrule = center 1, match:float match: negative:xwayland  # Center all float oning windows (not xwayland cause popups)

# Float, resize and center
windowrule = float on, match:class org\.gnome\.Settings
windowrule = size 70% 80%, match:class org\.gnome\.Settings
windowrule = center 1, match:class org\.gnome\.Settings
windowrule = float on, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser
windowrule = size 60% 70%, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser
windowrule = center 1, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser
windowrule = float on, match:class nwg-look
windowrule = size 50% 60%, match:class nwg-look
windowrule = center 1, match:class nwg-look

# Dialogs
windowrule = float on, match:title (Select|Open)( a)? (File|Folder)(s)?
windowrule = float on, match:title File (Operation|Upload)( Progress)?
windowrule = float on, match:title .* Properties
windowrule = float on, match:title Export Image as PNG
windowrule = float on, match:title GIMP Crash Debug
windowrule = float on, match:title Save As
windowrule = float on, match:title Library

# # Picture in picture (resize and move done via script)
# windowrule = move 100%-w-2% 100%-w-3%, match:title Picture(-| )in(-| )[Pp]icture  # Initial move so window doesn't shoot across the screen from the center
# windowrule = keepaspectratio, match:title Picture(-| )in(-| )[Pp]icture
# windowrule = float on, match:title Picture(-| )in(-| )[Pp]icture
# windowrule = pin, match:title Picture(-| )in(-| )[Pp]icture

# Steam
windowrule = rounding 10, match:title steam , match:class steam
windowrule = float on, match:title Friends List, match:class steam
windowrule = idle_inhibit always, match:class steam_app_[0-9]+  # Always idle inhibit when playing a steam game

# Ugh xwayland popups
windowrule = no_dim on xwayland on, match:title win[0-9]+
windowrule = no_shadow on xwayland on, match:title win[0-9]+
windowrule = rounding 10 xwayland on, match:title win[0-9]+

# ######## Workspace rules ########
workspace = w[tv1]s[false], gapsout:20, gapsin:20
workspace = f[1]s[false], gapsout:20, gapsin:20

# ######## Layer rules ########
layerrule = animation fade, match:class hyprpicker  # Colour picker out animation
layerrule = animation fade, match:class logout_dialog  # wlogout
layerrule = animation fade, match:class selection  # slurp
layerrule = animation fade, match:class wayfreeze

# Fuzzel
layerrule = animation popin 80%, match:class launcher
# layerrule = match:class launcher, no_blur on

# Shell
layerrule = no_anim on, match:class "caelestia-(launcher|osd|notifications|border-exclusion|area-picker)"
layerrule = animation fade, match:class "caelestia-(drawers|background)"
layerrule = order 1, match:class caelestia-border-exclusion
layerrule = order 2, match:class caelestia-bar

windowrulev2=noscreenshare,match:class ^(itch)$
# windowrulev2=noscreenshare,match:class ^(vesktop)$
