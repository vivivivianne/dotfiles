# Dynamic Hyprland Style settings, modified by wpgtk

general {
    gaps_workspaces = $workspaceGaps
    gaps_in = $windowGapsIn
    gaps_out = $windowGapsOut
    border_size = $windowBorderSize

    col.active_border = $activeWindowBorderColour
    col.inactive_border = $inactiveWindowBorderColour
}

decoration {
    rounding = $windowRounding

    blur {
        enabled = $blurEnabled
        xray = $blurXray
        special = $blurSpecialWs
        ignore_opacity = true  # Allows opacity blurring
        new_optimizations = true
        popups = $blurPopups
        input_methods = $blurInputMethods
        size = $blurSize
        passes = $blurPasses
    }

    shadow {
        enabled = $shadowEnabled
        range = $shadowRange
        render_power = $shadowRenderPower
        color = $shadowColour
    }
}

group {
    col.border_active = $activeWindowBorderColour
    col.border_inactive = $inactiveWindowBorderColour
    col.border_locked_active = $activeWindowBorderColour
    col.border_locked_inactive = $inactiveWindowBorderColour

    groupbar {
        font_family = JetBrainsMono NF ExtraBold
        font_size = 13
        gradients = true
        font_weight_active = ultraheavy
        font_weight_inactive = ultraheavy
        gradient_round_only_edges = false
        gradient_rounding = 6
        height = 20
        indicator_height =0 
        gaps_in = 4
        gaps_out = 4

        text_color = rgb($onPrimary)
        text_color_inactive = rgb($secondary)
        col.active = rgba($primaryff)  # used d4 opacity before changes
        col.inactive = rgba($surfaceContainerff)
        col.locked_active = rgba($primaryff)
        col.locked_inactive = rgba($secondaryff)
    }
}

plugin {
    hyprbars {
        # example config
		bar_precedence_over_border=true
        bar_height = 24
		bar_title_enabled = true
		bar_color= rgb(050508)
		col.text = rgb(385273)
		bar_text_font=Mononoki Nerd Font
		bar_part_of_window = true
		bar_text_size=12
		bar_button_padding=6
        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(050508),18,󰝙, hyprctl dispatch killactive       ,rgb(385273)
        hyprbars-button = rgb(050508),18,, hyprctl dispatch fullscreen 1     ,rgb(773e46)
        hyprbars-button = rgb(050508),18,󰩖, hyprctl dispatch togglefloating   ,rgb(457e84)
	}
	# hyprexpo {
	# 		columns = 3
	# 		gap_size = 4
	# 		bg_col = rgb(#050508.strip)
