# Dynamic Hyprland Style settings, modified by wpgtk

general {

    gaps_in=4
	float_gaps=4
    gaps_out=16,16,16,16
    border_size=2
    col.active_border= rgb(525478)
    col.inactive_border=rgb(2e1b25)

}

decoration {

    rounding=8
	blur {
		enabled= on
		size=8 # minimum 1
		passes=2 # minimum 1
		new_optimizations=1
		ignore_opacity = true  # Allows opacity blurring
        new_optimizations = true
        popups = true
        input_methods = true
	}
	shadow {
		enabled= off
		range=0
		offset=0 0
		sharp=false
		render_power=0
		color=rgb(525478)
		color_inactive= rgb(2e1b25)
		}

}

group {
	col.border_inactive= rgb(474855)
    col.border_active= rgb(525478)
		groupbar {
			keep_upper_gap=false
			height=1
			round_only_edges=false
			text_offset=-8
			indicator_height=18
			rounding=4
			col.inactive=rgb(0f090c)
			col.active= rgb(2e1b25)
			font_size = 12
			font_family=ShureTechMono Nerd Font Mono Bold
			text_color = rgb(525478)
			gradients =false 
			render_titles= true
		}
	}

plugin {
    hyprbars {
        # example config
		bar_precedence_over_border=true
        bar_height = 24
		bar_title_enabled = true
		bar_color= rgb(0f090c)
		col.text = rgb(525478)
		bar_text_font=Mononoki Nerd Font
		bar_part_of_window = true
		bar_text_size=12
		bar_button_padding=6
        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(0f090c),18,󰝙, hyprctl dispatch killactive       ,rgb(525478)
        hyprbars-button = rgb(0f090c),18,, hyprctl dispatch fullscreen 1     ,rgb(7dbf8c)
        hyprbars-button = rgb(0f090c),18,󰩖, hyprctl dispatch togglefloating   ,rgb(5e839a)
	}
	# hyprexpo {
	# 		columns = 3
	# 		gap_size = 4
