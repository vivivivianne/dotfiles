
# ############# Themes #############
env = QT_QPA_PLATFORMTHEME, qtengine 
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1

# ######## Toolkit backends ########
env = GDK_BACKEND, wayland,x11
env = QT_QPA_PLATFORM, wayland;xcb
env = SDL_VIDEODRIVER, wayland,x11,windows
env = CLUTTER_BACKEND, wayland
env = ELECTRON_OZONE_PLATFORM_HINT, auto

# ####### XDG specifications #######
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# ############# Others #############
env = _JAVA_AWT_WM_NONREPARENTING, 1

env = HYPRCURSOR_THEME,~/.local/share/icons/Bibata_modern_ice_cursor
env = HYPRCURSOR_SIZE,24

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice

env = XDG_CONFIG_HOME,$HOME/.config
env = XDG_CACHE_HOME,$HOME/.cache
env = XDG_DATA_HOME,$HOME/.local/share
env = XDG_STATE_HOME,$HOME/.local/state

env = XDG_DESKTOP_DIR,$HOME/Desktop
env = XDG_DOWNLOAD_DIR,$HOME/Downloads
env = XDG_DOCUMENTS_DIR,$HOME/SYNC/Documentos
env = XDG_MUSIC_DIR,$HOME/SYNC/playlist
env = XDG_PICTURES_DIR,$HOME/Pictures
env = XDG_VIDEOS_DIR, $HOME/Vídeos

# Language & Tool Runtimes (Expanded paths manually for Hyprland safety)
env = ANDROID_HOME,$HOME/.local/share/android
env = CARGO_HOME,$HOME/.local/state/cargo
env = GNUPGHOME,$HOME/.local/share/gnupg
env = RUSTUP_HOME,$HOME/.local/share/rustup
env = GOPATH,$HOME/.local/share/go

# App Specific
env = XPLR_BOOKMARK_FILE,$HOME/.config/xplr/bookmarks
